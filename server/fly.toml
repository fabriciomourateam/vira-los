app = "vira-los-server"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3001"
  NODE_ENV = "production"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

  [http_service.checks]
    [http_service.checks.health]
      grace_period = "30s"
      interval = "30s"
      method = "GET"
      path = "/api/health"
      timeout = "5s"

[mounts]
  source = "data"
  destination = "/app/data"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1
