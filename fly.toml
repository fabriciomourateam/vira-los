app = 'vira-los'
primary_region = 'ams'

[build]

[env]
  PORT = "8080"
  NODE_ENV = "production"
  SERVER_URL = "https://vira-los.fly.dev"
  # Uploads (clipes crus + reels renderizados) vão pro volume persistente
  # (/app/data é o mount). Sem isso, cada deploy apaga os vídeos enviados.
  UPLOADS_DIR = "/app/data/uploads"

[http_service]
  internal_port = 8080
  force_https = true
  # Máquina dorme por inatividade (economia). É ACORDADA por HTTP — a rotina
  # diária roda via cron externo (GitHub Actions) que bate em /api/daily-content
  # e fica fazendo polling até concluir, mantendo a máquina viva durante a geração.
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  max_machines_running = 1
  processes = ['app']

[[mounts]]
  source = 'vira_los_data'
  destination = '/app/data'
  initial_size = '3gb'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
