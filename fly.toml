app = 'vira-los'
primary_region = 'ams'

[build]

[env]
  PORT = "8080"
  NODE_ENV = "production"
  SERVER_URL = "https://vira-los.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  # Máquina sempre de pé (min 1) pro cron das 09h (rotina diária) disparar.
  # Com auto_stop=true e min=0 a máquina dormia por inatividade e o cron não rodava.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1
  processes = ['app']

[[mounts]]
  source = 'vira_los_data'
  destination = '/app/data'
  initial_size = '3gb'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
