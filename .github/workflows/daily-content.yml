name: Conteúdo diário (09h BRT)

# Roda todo dia de manhã (America/Sao_Paulo) e tem um horário de BACKUP à tarde.
# O agendamento do GitHub Actions é "melhor esforço" e às vezes DROPA execuções (pior
# no minuto :00 do topo da hora). Por isso: (1) o horário sai de :00 pra :17, o que
# reduz muito a chance de ser descartado; (2) tem um segundo disparo à tarde — se o da
# manhã cair, o de backup gera o dia. O guard de idempotência do serviço evita gerar
# em dobro: se a manhã já gerou, o backup só confere e sai.
#   09:17 BRT = 12:17 UTC  ·  13:17 BRT (backup) = 16:17 UTC

on:
  schedule:
    - cron: '17 12 * * *'   # manhã (~09:17 BRT)
    - cron: '17 16 * * *'   # backup à tarde (~13:17 BRT) — cobre se a manhã dropar
  workflow_dispatch: {}   # permite rodar manualmente pelo botão do GitHub

jobs:
  gerar:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar e aguardar a geração diária
        env:
          BASE: https://vira-los.fly.dev
          KEY: ${{ secrets.DAILY_CRON_SECRET }}   # opcional; só é exigida se setada no Fly
        run: |
          set -e
          today=$(TZ=America/Sao_Paulo date +%F)
          echo "Acordando a máquina e disparando a geração de $today..."
          curl -sS -m 60 -X POST "$BASE/api/daily-content/generate" \
            -H "Content-Type: application/json" \
            -H "x-cron-key: $KEY" \
            -d '{"trigger":"cron"}' || true

          echo "Aguardando o batch ficar pronto (mantém a máquina acordada)..."
          for i in $(seq 1 40); do
            sleep 30
            resp=$(curl -sS -m 30 "$BASE/api/daily-content" || echo '{}')
            status=$(echo "$resp" | jq -r --arg d "$today" '[.batches[]? | select(.date==$d)][0].status // "none"')
            echo "  tentativa $i — status de hoje: $status"
            if [ "$status" = "done" ] || [ "$status" = "partial" ]; then
              echo "✅ Conteúdo de $today gerado (status: $status)."
              exit 0
            fi
            if [ "$status" = "error" ]; then
              # A geração falhou no servidor — imprime o erro real e falha o run (visibilidade).
              errs=$(echo "$resp" | jq -r --arg d "$today" '[.batches[]? | select(.date==$d)][0].errors // [] | join(" || ")')
              echo "❌ Geração de $today falhou no servidor. Erros: $errs"
              exit 1
            fi
          done
          echo "⚠️ Timeout aguardando concluir — a geração pode ainda estar rodando no servidor."
          exit 1
