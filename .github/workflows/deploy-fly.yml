name: Deploy Backend to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # permite redeploy manual pelo botão do GitHub

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # --no-cache: o build remoto do Fly estava reaproveitando a camada
      # "COPY server/ ." antiga e publicando imagens SEM as mudanças de código.
      # --strategy immediate + machine list: força a substituição da máquina em
      # execução (havia máquina servindo código velho) e mostra o estado real.
      - run: |
          flyctl deploy --remote-only --no-cache --strategy immediate
          echo "=== máquinas de vira-los após o deploy ==="
          flyctl machine list -a vira-los
          echo "=== PROVA: o código no disco da máquina tem meus fixes? ==="
          echo "--- carouselService: require do db (esperado: 1 linha) ---"
          flyctl ssh console -a vira-los -C "grep -n require../db/database /app/services/carouselService.js" || echo "(ssh/grep falhou)"
          echo "--- dailyContentService: placeholder generating (esperado: linha com status: generating) ---"
          flyctl ssh console -a vira-los -C "grep -n generating /app/services/dailyContentService.js" || echo "(ssh/grep falhou)"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
