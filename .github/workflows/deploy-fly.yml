name: Deploy Backend to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # permite redeploy manual pelo botão do GitHub

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # COMBINA os dois: --no-cache garante imagem com o código atual;
      # o restart explícito de cada máquina força a subir NESSA imagem
      # (a máquina, com volume+auto-stop, não trocava sozinha). Depois,
      # prova via ssh o código que ficou no disco da máquina em execução.
      - run: |
          flyctl deploy --remote-only --no-cache --strategy immediate
          echo "=== forçando restart de cada máquina na imagem nova ==="
          for m in $(flyctl machines list --json -a vira-los | jq -r '.[].id'); do
            echo "restart $m"
            flyctl machine restart "$m" -a vira-los || true
          done
          echo "=== estado final ==="
          flyctl machine list -a vira-los
          echo "=== PROVA (máquina started após restart): código no disco ==="
          flyctl ssh console -a vira-los -C "grep -n database /app/services/carouselService.js" || echo "(ssh falhou)"
          flyctl ssh console -a vira-los -C "grep -c generating /app/services/dailyContentService.js" || echo "(ssh falhou)"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
