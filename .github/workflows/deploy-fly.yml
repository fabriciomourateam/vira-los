name: Deploy Backend to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # permite redeploy manual pelo botão do GitHub

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # A máquina estava presa numa imagem antiga: os deploys atualizavam a
      # config mas a máquina (com volume, auto-stop) não trocava de imagem ao
      # acordar. --strategy immediate + restart explícito de cada máquina força
      # a máquina a subir na release recém-publicada.
      - run: |
          flyctl deploy --remote-only --strategy immediate
          echo "=== forçando restart de cada máquina na imagem nova ==="
          for m in $(flyctl machines list --json -a vira-los | jq -r '.[].id'); do
            echo "restart $m"
            flyctl machine restart "$m" -a vira-los || true
          done
          echo "=== estado final ==="
          flyctl machine list -a vira-los
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
