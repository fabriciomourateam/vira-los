name: Deploy Backend to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # permite redeploy manual pelo botão do GitHub

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # A imagem já tem o código novo (release atual). O problema era a flag
      # em memória state.generating presa em true de uma geração travada, que
      # o restart não resetava. STOP total mata o processo; o próximo request
      # (cron diário) faz cold-start com o processo limpo (state.generating=false).
      - run: |
          flyctl deploy --remote-only --strategy immediate
          echo "=== parando cada máquina (kill do processo, reseta state.generating) ==="
          for m in $(flyctl machines list --json -a vira-los | jq -r '.[].id'); do
            echo "stop $m"
            flyctl machine stop "$m" -a vira-los || true
          done
          echo "=== estado final (deve estar stopped; acorda no próximo request) ==="
          flyctl machine list -a vira-los
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
