name: Deploy Backend to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # permite redeploy manual pelo botão do GitHub

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # --no-cache é OBRIGATÓRIO: sem ele o build remoto do Fly reaproveita a
      # camada "COPY server/ ." do cache e publica imagens SEM as mudanças de
      # código (deploy dá "success" mas o app roda código velho). --strategy
      # immediate força a máquina a subir na release recém-publicada.
      - run: flyctl deploy --remote-only --no-cache --strategy immediate
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
