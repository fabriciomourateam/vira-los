name: Deploy Backend to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # permite redeploy manual pelo botão do GitHub

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: |
          flyctl deploy --remote-only --no-cache --strategy immediate
          echo "=== disparando geração e capturando o STACK real do erro (flyctl logs) ==="
          curl -sS -m 30 -X POST https://vira-los.fly.dev/api/daily-content/generate \
            -H "Content-Type: application/json" -d '{"trigger":"cron"}' || true
          sleep 12
          echo "----- LOGS DA APP (stack do db is not defined) -----"
          timeout 45 flyctl logs -a vira-los || true
          echo "----- fim dos logs -----"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
